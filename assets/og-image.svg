    <line x1="-136" y1="0" x2="-34" y2="0"/>
    <line x1="34" y1="0" x2="136" y2="0"/>
    <circle cx="0" cy="13" r="5"/>
    <path d="M-5 7 -16 -18 M-2 6 -8 -22 M2 6 8 -22 M5 7 16 -18"/>
    <path d="M-16 -18 Q0 -27 16 -18 M-9 -1 Q0 -5 9 -1"/>
